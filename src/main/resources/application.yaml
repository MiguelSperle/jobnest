spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: jobnest
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    schemas: public
    default-schema: public
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: 5672
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 4
          initial-interval: 3000
          multiplier: 2
          max-interval: 12000
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}

security:
  token:
    secret: ${JWT_SECRET}

amqp:
  queues:
    user-code-created:
      exchange-properties:
        name: user.code.events
        type: direct
      routing-key: user.code.created
      queue: user.code.created.queue
      dead-letter-queue-properties:
        queue: user.code.created.queue.dlq
        exchange: user.code.events.dlq
        routing-key: user.code.created.dlq
    subscription-created:
      exchange-properties:
        name: subscription.events
        type: direct
      routing-key: subscription.created
      queue: subscription.created.queue
      dead-letter-queue-properties:
        queue: subscription.created.queue.dlq
        exchange: subscription.events.dlq
        routing-key: subscription.created.dlq